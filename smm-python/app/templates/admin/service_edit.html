{% extends 'base.html' %}
{% block content %}
<div class="admin-hub">
  <div class="admin-hub-shell">
    <div class="admin-hub-toolbar">
      <strong>Edit Service #{{ service.id }}</strong>
      <a class="btn btn-sm btn-admin-search ms-auto" href="{{ url_for('admin_services') }}">Back</a>
    </div>

    <div class="admin-hub-panel p-3">
      <form method="post" class="row g-2">
        <div class="col-md-6">
          <label class="form-label">Name</label>
          <input class="form-control" name="name" value="{{ service.name }}" required>
        </div>
        <div class="col-md-6">
          <label class="form-label">Category</label>
          <input class="form-control" name="category" value="{{ service.category }}" required>
        </div>
        <div class="col-md-6">
          <label class="form-label">Provider</label>
          <select class="form-select" name="provider_id">
            <option value="">manual</option>
            {% for provider in providers %}
            <option value="{{ provider.id }}" {% if service.provider_id == provider.id %}selected{% endif %}>{{ provider.name }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label">Provider Service ID</label>
          <input class="form-control" name="provider_service_id" value="{{ service.provider_service_id or '' }}" placeholder="Optional">
        </div>
        <div class="col-12">
          <label class="form-label">Description</label>
          <textarea class="form-control" name="description" rows="4">{{ service.description }}</textarea>
        </div>
        <div class="col-md-6">
          <label class="form-label">Average time</label>
          <input
            class="form-control"
            name="average_time"
            value="{{ service.average_time or '' }}"
            placeholder="e.g. 1-3 hours"
          >
        </div>
        <div class="col-md-3">
          <label class="form-label">Rate per 1000</label>
          <input class="form-control" name="price_per_1000" type="number" step="0.0001" min="0" value="{{ '%.4f'|format(service.price_per_1000) }}" required>
        </div>
        <div class="col-md-3">
          <label class="form-label">Min Qty</label>
          <input class="form-control" name="min_qty" type="number" min="1" value="{{ service.min_qty }}" required>
        </div>
        <div class="col-md-3">
          <label class="form-label">Max Qty</label>
          <input class="form-control" name="max_qty" type="number" min="1" value="{{ service.max_qty }}" required>
        </div>
        <div class="col-md-3">
          <label class="form-label">Status</label>
          <select class="form-select" name="status">
            <option value="active" {% if service.status == 'active' %}selected{% endif %}>active</option>
            <option value="paused" {% if service.status == 'paused' %}selected{% endif %}>paused</option>
          </select>
        </div>
        <div class="col-md-3 d-flex align-items-end">
          <div>
            <div class="form-check">
              <input class="form-check-input" type="checkbox" name="provider_refill" id="provider_refill" {% if service.provider_refill %}checked{% endif %}>
              <label class="form-check-label" for="provider_refill">Refill enabled</label>
            </div>
            <div class="form-check">
              <input class="form-check-input" type="checkbox" name="provider_cancel" id="provider_cancel" {% if service.provider_cancel %}checked{% endif %}>
              <label class="form-check-label" for="provider_cancel">Cancel enabled</label>
            </div>
          </div>
        </div>
        <div class="col-12 d-flex gap-2 mt-2">
          <button class="btn btn-primary">Save Changes</button>
          <a class="btn btn-admin-search" href="{{ url_for('admin_services') }}">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
