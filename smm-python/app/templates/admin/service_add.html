{% extends 'base.html' %}
{% block content %}
<div class="admin-hub">
  <div class="admin-hub-shell">
    <div class="admin-hub-toolbar">
      <strong>Add Service</strong>
      <a class="btn btn-sm btn-admin-search ms-auto" href="{{ url_for('admin_services') }}">Back to Services</a>
    </div>

    <div class="row g-3 p-3">
      <div class="col-xl-5">
        <div class="admin-hub-panel p-3 h-100">
          <h6 class="mb-3">Manual Add</h6>
          <form method="post" class="row g-2">
            <input type="hidden" name="action" value="add_single">
            <div class="col-md-6">
              <label class="form-label">Service name</label>
              <input class="form-control" name="name" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">Category</label>
              <input class="form-control" name="category" required>
            </div>
            <div class="col-12">
              <label class="form-label">Service description</label>
              <textarea class="form-control" name="description" rows="4"></textarea>
            </div>
            <div class="col-md-6">
              <label class="form-label">Average time</label>
              <input class="form-control" name="average_time" placeholder="e.g. 1-3 hours">
            </div>
            <div class="col-md-6">
              <label class="form-label">Provider</label>
              <select class="form-select" name="provider_id">
                <option value="">manual</option>
                {% for provider in providers %}
                <option value="{{ provider.id }}">{{ provider.name }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label">Provider service ID (optional)</label>
              <input class="form-control" name="provider_service_id">
            </div>
            <div class="col-md-4">
              <label class="form-label">Rate per 1000</label>
              <input class="form-control" name="price_per_1000" type="number" step="0.0001" min="0" required>
            </div>
            <div class="col-md-4">
              <label class="form-label">Min qty</label>
              <input class="form-control" name="min_qty" type="number" min="1" required>
            </div>
            <div class="col-md-4">
              <label class="form-label">Max qty</label>
              <input class="form-control" name="max_qty" type="number" min="1" required>
            </div>
            <div class="col-md-4">
              <label class="form-label">Status</label>
              <select class="form-select" name="status">
                <option value="active">active</option>
                <option value="paused">paused</option>
              </select>
            </div>
            <div class="col-md-8 d-flex align-items-end gap-3">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" name="provider_refill" id="provider_refill_new">
                <label class="form-check-label" for="provider_refill_new">Refill enabled</label>
              </div>
              <div class="form-check">
                <input class="form-check-input" type="checkbox" name="provider_cancel" id="provider_cancel_new">
                <label class="form-check-label" for="provider_cancel_new">Cancel enabled</label>
              </div>
            </div>
            <div class="col-12 d-flex gap-2 mt-2">
              <button class="btn btn-success">Add Service</button>
            </div>
          </form>
        </div>
      </div>

      <div class="col-xl-7">
        <div class="admin-hub-panel p-3 h-100">
          <h6 class="mb-3">Import Selected From Provider</h6>
          <a class="btn btn-admin-search" href="{{ url_for('admin_import_services') }}">Import From Provider</a>
          <div class="small text-muted mt-3">After loading, you will be redirected to a separate scrollable page where you can select specific services to import.</div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
