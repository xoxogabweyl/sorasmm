{% extends 'base.html' %}
{% block content %}
<div class="new-order-page">
  <h3 class="mb-3">New Order</h3>
  <div class="row">
    <div class="col-lg-9 col-xl-8">
      <div class="card p-3 shadow-sm new-order-card">
        <form method="post" id="new-order-form">
          <div class="mb-3">
            <label class="form-label">Quick Category</label>
            <div class="category-icon-grid" id="quick-category-grid"></div>
          </div>

          <div class="mb-3">
            <label class="form-label" for="category_select">Category</label>
            <select class="form-select new-order-select" id="category_select"></select>
          </div>

          <div class="mb-2">
            <label class="form-label" for="service_id">Service</label>
            <select class="form-select new-order-select" name="service_id" id="service_id" required></select>
            <small class="text-muted d-block mt-2" id="service-description"></small>
          </div>

          <div class="mb-3">
            <label class="form-label d-inline-flex align-items-center gap-2" for="average_time_display">
              Average time
              <span class="avg-time-info" title="Estimated completion time">!</span>
            </label>
            <input
              class="form-control new-order-input avg-time-display"
              id="average_time_display"
              type="text"
              value="Not specified"
              readonly
            >
          </div>

          <div class="mb-3">
            <label class="form-label" for="link">Link</label>
            <input class="form-control new-order-input" id="link" name="link" placeholder="https://..." required>
          </div>

          <div class="mb-1">
            <label class="form-label" for="quantity">Quantity</label>
            <input class="form-control new-order-input" id="quantity" name="quantity" type="number" min="1" required>
          </div>
          <small class="text-muted d-block mb-3" id="service-limits"></small>

          <div class="mb-3">
            <label class="form-label" for="charge_display">Charge</label>
            <input class="form-control new-order-input" id="charge_display" type="text" value="{{ currency_symbol }}0.0000" readonly>
          </div>

          <button class="btn btn-primary new-order-submit">Place Order</button>
        </form>
      </div>
    </div>
  </div>
</div>

<script>
  (function () {
    const services = [
      {% for s in services %}
      {
        id: {{ s.id }},
        name: {{ s.name|tojson }},
        description: {{ (s.description or "")|tojson }},
        average_time: {{ (s.display_average_time or s.average_time or "")|tojson }},
        category: {{ (s.category or "General")|tojson }},
        price_per_1000: {{ "%.8f"|format(s.price_per_1000) }},
        min_qty: {{ s.min_qty }},
        max_qty: {{ s.max_qty }}
      }{% if not loop.last %},{% endif %}
      {% endfor %}
    ];

    const currencySymbol = {{ currency_symbol|tojson }};
    const currencyRate = Number({{ "%.8f"|format(currency_rate) }}) || 1;

    const quickGrid = document.getElementById("quick-category-grid");
    const categorySelect = document.getElementById("category_select");
    const serviceSelect = document.getElementById("service_id");
    const descriptionEl = document.getElementById("service-description");
    const averageTimeInput = document.getElementById("average_time_display");
    const linkInput = document.getElementById("link");
    const qtyInput = document.getElementById("quantity");
    const limitsEl = document.getElementById("service-limits");
    const chargeInput = document.getElementById("charge_display");
    const submitBtn = document.querySelector(".new-order-submit");

    const platformDefs = [
      { key: "all", label: "All" },
      { key: "tiktok", label: "TikTok", regex: /tiktok/i },
      { key: "instagram", label: "Instagram", regex: /instagram|insta(?!nt)/i },
      { key: "youtube", label: "YouTube", regex: /youtube|yt\b/i },
      { key: "facebook", label: "Facebook", regex: /facebook|fb\b/i },
      { key: "telegram", label: "Telegram", regex: /telegram/i },
      { key: "x", label: "X", regex: /twitter|(^|[\s\-\[\(])x($|[\s\]\)])/i },
      { key: "other", label: "Other", regex: /.*/i }
    ];

    const linkPlaceholders = {
      tiktok: "https://www.tiktok.com/@username",
      instagram: "https://www.instagram.com/username",
      youtube: "https://www.youtube.com/watch?v=...",
      facebook: "https://www.facebook.com/username",
      telegram: "https://t.me/username",
      x: "https://x.com/username",
      other: "https://..."
    };

    let activeQuick = "all";

    function iconSvg(platformKey) {
      if (platformKey === "tiktok") {
        return '<svg viewBox="0 0 24 24" fill="none"><path d="M14 5v8.5a3.5 3.5 0 1 1-3.5-3.5"></path><path d="M14 8a4 4 0 0 0 4 4"></path></svg>';
      }
      if (platformKey === "instagram") {
        return '<svg viewBox="0 0 24 24" fill="none"><rect x="4" y="4" width="16" height="16" rx="4"></rect><circle cx="12" cy="12" r="3.4"></circle><circle cx="16.5" cy="7.5" r="1"></circle></svg>';
      }
      if (platformKey === "youtube") {
        return '<svg viewBox="0 0 24 24" fill="none"><rect x="3.5" y="6" width="17" height="12" rx="3"></rect><path d="M10.5 9.5L15 12l-4.5 2.5z"></path></svg>';
      }
      if (platformKey === "facebook") {
        return '<svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9"></circle><path d="M13 8h-1.2A1.8 1.8 0 0 0 10 9.8V11h3l-.4 2H10v5"></path></svg>';
      }
      if (platformKey === "telegram") {
        return '<svg viewBox="0 0 24 24" fill="none"><path d="M21 4L3 11l6 2 2 6 10-15z"></path></svg>';
      }
      if (platformKey === "x") {
        return '<svg viewBox="0 0 24 24" fill="none"><path d="M6 6l12 12M18 6L6 18"></path></svg>';
      }
      if (platformKey === "other") {
        return '<svg viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14"></path></svg>';
      }
      return '<svg viewBox="0 0 24 24" fill="none"><path d="M4 7h16M4 12h16M4 17h16"></path></svg>';
    }

    function detectPlatform(text) {
      const source = String(text || "");
      for (let i = 1; i < platformDefs.length - 1; i += 1) {
        const p = platformDefs[i];
        if (p.regex && p.regex.test(source)) return p.key;
      }
      return "other";
    }

    function servicePlatform(service) {
      return detectPlatform((service.category || "") + " " + (service.name || ""));
    }

    function getVisiblePlatforms() {
      const found = new Set();
      services.forEach((service) => found.add(servicePlatform(service)));
      const visible = [{ key: "all", label: "All" }];
      platformDefs.forEach((p) => {
        if (p.key === "all") return;
        if (found.has(p.key)) {
          visible.push({ key: p.key, label: p.label });
        }
      });
      return visible;
    }

    function renderQuickButtons() {
      const visiblePlatforms = getVisiblePlatforms();
      quickGrid.innerHTML = "";
      visiblePlatforms.forEach((platform) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "category-icon-btn" + (platform.key === activeQuick ? " active" : "");
        button.dataset.platform = platform.key;
        button.innerHTML =
          '<span class="category-icon-badge" aria-hidden="true">' + iconSvg(platform.key) + "</span>" +
          '<span class="category-icon-label">' + platform.label + "</span>";
        button.addEventListener("click", function () {
          activeQuick = platform.key;
          renderQuickButtons();
          populateCategories();
          populateServices();
          updateServiceMeta();
          updateCharge();
        });
        quickGrid.appendChild(button);
      });
    }

    function platformMatches(service) {
      return activeQuick === "all" || servicePlatform(service) === activeQuick;
    }

    function currentQuickLabel() {
      for (let i = 0; i < platformDefs.length; i += 1) {
        if (platformDefs[i].key === activeQuick) return platformDefs[i].label;
      }
      return "Category";
    }

    function getCategoryList() {
      const names = new Set();
      services.forEach((service) => {
        if (!platformMatches(service)) return;
        names.add(service.category || "General");
      });
      return Array.from(names).sort((a, b) => a.localeCompare(b));
    }

    function populateCategories() {
      const previous = categorySelect.value || "all";
      const categories = getCategoryList();
      categorySelect.innerHTML = "";

      const topOption = document.createElement("option");
      topOption.value = "all";
      topOption.textContent = activeQuick === "all" ? "All Categories" : "All " + currentQuickLabel();
      categorySelect.appendChild(topOption);

      categories.forEach((categoryName) => {
        const option = document.createElement("option");
        option.value = categoryName;
        option.textContent = categoryName;
        categorySelect.appendChild(option);
      });

      if (categories.indexOf(previous) > -1) {
        categorySelect.value = previous;
      } else {
        categorySelect.value = "all";
      }
    }

    function filteredServices() {
      const selectedCategory = categorySelect.value || "all";
      return services
        .filter((service) => {
          if (!platformMatches(service)) return false;
          if (selectedCategory !== "all" && service.category !== selectedCategory) return false;
          return true;
        })
        .sort((a, b) => {
          if (a.price_per_1000 !== b.price_per_1000) return a.price_per_1000 - b.price_per_1000;
          return a.id - b.id;
        });
    }

    function populateServices() {
      const previous = serviceSelect.value;
      const list = filteredServices();
      serviceSelect.innerHTML = "";

      list.forEach((service) => {
        const option = document.createElement("option");
        option.value = String(service.id);
        option.dataset.description = service.description || "";
        option.dataset.averageTime = service.average_time || "";
        option.dataset.category = service.category || "";
        option.dataset.minQty = String(service.min_qty || 1);
        option.dataset.maxQty = String(service.max_qty || 1);
        option.dataset.pricePer1000 = String(service.price_per_1000 || 0);

        const convertedRate = (Number(service.price_per_1000 || 0) * currencyRate).toFixed(4);
        option.textContent =
          "#" + service.id + " - " + service.name + " (" + currencySymbol + convertedRate + " / 1000)";
        serviceSelect.appendChild(option);
      });

      if (list.length === 0) {
        const empty = document.createElement("option");
        empty.value = "";
        empty.textContent = "No services available for this category";
        serviceSelect.appendChild(empty);
        serviceSelect.disabled = true;
        if (submitBtn) submitBtn.disabled = true;
      } else {
        serviceSelect.disabled = false;
        if (submitBtn) submitBtn.disabled = false;
        const exists = list.some((service) => String(service.id) === previous);
        serviceSelect.value = exists ? previous : String(list[0].id);
      }
    }

    function placeholderForSelected() {
      const selectedOption = serviceSelect.options[serviceSelect.selectedIndex];
      const source = selectedOption
        ? (selectedOption.dataset.category || "") + " " + selectedOption.textContent
        : "";
      const key = detectPlatform(source);
      return linkPlaceholders[key] || linkPlaceholders.other;
    }

    function updateServiceMeta() {
      if (!serviceSelect || !descriptionEl || !averageTimeInput || !qtyInput || !limitsEl) return;
      const selectedOption = serviceSelect.options[serviceSelect.selectedIndex];
      if (!selectedOption || !selectedOption.value) {
        descriptionEl.textContent = "No description available for this service.";
        averageTimeInput.value = "Not specified";
        limitsEl.textContent = "";
        if (linkInput) linkInput.placeholder = "https://...";
        return;
      }

      const minQty = Math.max(1, Number(selectedOption.dataset.minQty || 1));
      const maxQty = Math.max(minQty, Number(selectedOption.dataset.maxQty || minQty));
      const description = selectedOption.dataset.description || "";
      const averageTime = selectedOption.dataset.averageTime || "";

      descriptionEl.textContent = description || "No description available for this service.";
      averageTimeInput.value = averageTime || "Not specified";
      limitsEl.textContent = "Min: " + minQty + " - Max: " + maxQty;
      qtyInput.min = String(minQty);
      qtyInput.max = String(maxQty);

      const entered = Number(qtyInput.value || 0);
      if (!Number.isFinite(entered) || entered < minQty) {
        qtyInput.value = String(minQty);
      } else if (entered > maxQty) {
        qtyInput.value = String(maxQty);
      }

      if (linkInput) {
        linkInput.placeholder = placeholderForSelected();
      }
    }

    function updateCharge() {
      if (!chargeInput || !serviceSelect || !qtyInput) return;
      const selectedOption = serviceSelect.options[serviceSelect.selectedIndex];
      if (!selectedOption || !selectedOption.value) {
        chargeInput.value = currencySymbol + "0.0000";
        return;
      }

      const pricePer1000 = Number(selectedOption.dataset.pricePer1000 || 0);
      const qty = Number(qtyInput.value || 0);
      if (!Number.isFinite(qty) || qty <= 0 || !Number.isFinite(pricePer1000)) {
        chargeInput.value = currencySymbol + "0.0000";
        return;
      }

      const charge = (qty / 1000) * pricePer1000 * currencyRate;
      chargeInput.value = currencySymbol + charge.toFixed(4);
    }

    if (!services.length) {
      renderQuickButtons();
      categorySelect.innerHTML = '<option value="all">All Categories</option>';
      serviceSelect.innerHTML = '<option value="">No services available</option>';
      serviceSelect.disabled = true;
      qtyInput.disabled = true;
      if (submitBtn) submitBtn.disabled = true;
      descriptionEl.textContent = "No description available for this service.";
      averageTimeInput.value = "Not specified";
      limitsEl.textContent = "";
      return;
    }

    renderQuickButtons();
    populateCategories();
    populateServices();
    updateServiceMeta();
    updateCharge();

    categorySelect.addEventListener("change", function () {
      populateServices();
      updateServiceMeta();
      updateCharge();
    });
    serviceSelect.addEventListener("change", function () {
      updateServiceMeta();
      updateCharge();
    });
    qtyInput.addEventListener("input", updateCharge);
  })();
</script>
{% endblock %}
